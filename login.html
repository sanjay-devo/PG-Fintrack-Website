<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login – PG Fintrack Secure Access</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Secure login for PG Fintrack, the smart PG group expense sharing app for India.">
  <meta name="keywords" content="PG expense sharing, group expense login, roommate expense tracker">
  <meta name="author" content="PG Fintrack">
  <link rel="icon" type="image/jpeg" href="https://indiacybercafe.com/wp-content/uploads/2026/04/Fintech_logo_design.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta property="og:title" content="PG Fintrack – Login">
  <meta property="og:description" content="Login to your PG Fintrack account and join your group.">
  <meta property="og:image" content="https://indiacybercafe.com/wp-content/uploads/2026/04/Fintech_logo_design.jpeg">
  <meta property="og:type" content="website">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    body { min-height: 100vh; background: #f8fafc; color-scheme: light dark; }
    .dark body { background: #0f172a; }
    * { transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
    .input-card { background: rgba(255,255,255,0.92); backdrop-filter: blur(18px); border: 1px solid rgba(148,163,184,0.3); }
    .dark .input-card { background: rgba(15,23,42,0.95); border-color: rgba(71,85,105,0.75); }
  </style>
</head>
<body class="flex min-h-screen items-center justify-center px-4 py-10 text-slate-900 dark:text-slate-100">
  <div class="w-full max-w-xl">
    <div class="input-card rounded-[32px] border shadow-xl p-8 sm:p-10">
      <div class="text-center mb-8">
        <div class="mx-auto mb-4 h-14 w-14 rounded-full bg-indigo-500 flex items-center justify-center text-white text-2xl font-bold">₹</div>
        <p class="text-xs uppercase tracking-[0.32em] text-indigo-600">Secure access</p>
        <h1 class="mt-4 text-3xl font-bold text-slate-900 dark:text-white">Welcome back to PG Fintrack</h1>
        <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">Sign in to manage group expenses with your roommates.</p>
      </div>

      <div id="errorMessage" class="hidden mb-4 rounded-3xl border border-rose-200 bg-rose-50 text-sm text-rose-700 px-4 py-3"></div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email or mobile</label>
          <input id="loginEmailPhone" type="text" placeholder="Enter email or mobile" class="w-full rounded-3xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-500/20 outline-none" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
          <div class="relative">
            <input id="loginPassword" type="password" placeholder="Enter password" class="w-full rounded-3xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 px-4 py-3 pr-14 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-500/20 outline-none" required>
            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-900 dark:hover:text-white" aria-label="Toggle password visibility">Show</button>
          </div>
        </div>
        <button type="submit" class="w-full rounded-3xl bg-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 hover:bg-indigo-700 transition">Login</button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">
        Don’t have an account? <a href="register.html" class="font-semibold text-indigo-600 hover:text-indigo-700">Register</a>
      </div>
      <div class="mt-2 text-center text-sm text-slate-400">
        Back to <a href="home.html" class="font-semibold text-indigo-500 hover:text-indigo-400">PG Fintrack home</a>.
      </div>
    </div>
  </div>

  <script>
    const FIREBASE_URL = 'https://pg-fintrack-website-default-rtdb.firebaseio.com';
    const STORAGE_KEY = 'pgfUser';

    const showError = (message) => {
      const el = document.getElementById('errorMessage');
      if (!message) {
        el.classList.add('hidden');
        el.textContent = '';
        return;
      }
      el.textContent = message;
      el.classList.remove('hidden');
    };

    const saveUser = (user) => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
    };

    const normalizeMobile = (value) => value.replace(/\D/g, '');

    const getStorageUser = () => {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    };

    const fetchAllUsers = async () => {
      const response = await fetch(`${FIREBASE_URL}/users.json`);
      if (!response.ok) throw new Error('Unable to fetch users');
      return await response.json();
    };

    const handleLogin = async (event) => {
      event.preventDefault();
      showError('');

      const emailPhone = document.getElementById('loginEmailPhone').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!emailPhone || !password) {
        showError('Please enter email/mobile and password.');
        return;
      }

      try {
        const users = await fetchAllUsers();
        if (!users) {
          showError('No users found. Please register first.');
          return;
        }

        let found = null;
        for (const id in users) {
          const user = users[id];
          if ((user.email === emailPhone || user.mobile === emailPhone) && user.password === password) {
            found = user;
            break;
          }
        }

        if (!found) {
          showError('Invalid credentials. Please try again.');
          return;
        }

        saveUser(found);
        window.location.href = 'group-select.html';
      } catch (error) {
        showError(error.message);
      }
    };

    document.getElementById('loginForm').addEventListener('submit', handleLogin);

    document.getElementById('togglePassword').addEventListener('click', () => {
      const pass = document.getElementById('loginPassword');
      if (!pass) return;
      pass.type = pass.type === 'password' ? 'text' : 'password';
    });

    const init = () => {
      const session = getStorageUser();
      if (session && session.uid) {
        window.location.href = 'group-select.html';
      }
    };

    init();
  </script>
</body>
</html>
